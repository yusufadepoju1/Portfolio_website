name: Flask CI/CD Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd ~/Portfolio_website
            git fetch --all
            git reset --hard origin/master
            
            # Re-install dependencies
            ~/venv/bin/pip install -r requirements.txt

            # Kill old process
            pkill -f app.py || true

            # Run with host 0.0.0.0 to make it public
            # We move the log inside the project folder for easier tracking
            nohup ~/venv/bin/python app.py --host=0.0.0.0 > ~/Portfolio_website/app.log 2>&1 &