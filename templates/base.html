<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <meta name="description" content="Personal portfolio showcasing projects and skills.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page-content { min-height: 85vh; }
        .nav-links a.active { color: white; border-bottom: 2px solid var(--accent-secondary); padding-bottom: 2px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glass-effect">
        <div class="nav-container">
            <a href="/" class="logo">Dev<span>Portfolio</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/contact" class="btn-primary">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 AI Developer Portfolio. Built with Python & CSS.</p>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
